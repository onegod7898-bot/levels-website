<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Levels - Instagram</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f9f9f9; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 60px; }
    h1 { font-size: 2.5rem; margin-bottom: 10px; color: #000; }
    .subtitle { font-size: 1.1rem; color: #666; margin-bottom: 40px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
    .post { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.3s ease; }
    .post:hover { transform: translateY(-5px); }
    .post-image { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: white; font-weight: bold; }
    .post-content { padding: 20px; text-align: center; }
    .post-content p:first-child { color: #333; font-weight: bold; margin-bottom: 8px; }
    .post-content p:last-child { color: #999; font-size: 0.9rem; }
    a { text-decoration: none; display: block; }
    a:hover { color: #667eea; }
    .profile { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <header>
    <h1>Follow Levels On Instagram</h1>
    <p class="subtitle">Take a peek at our 360 video booth experiences</p>
  </header>

  <div class="gallery">
    <!-- Post 1 -->
    <a href="https://www.instagram.com/p/DNBFgqVsBBf/?igsh=bGxlY3pwMDRka3Yx" target="_blank" rel="noopener noreferrer">
      <div class="post">
        <div class="post-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">📸</div>
        <div class="post-content">
          <p>Experience Gallery</p>
          <p>View on Instagram</p>
        </div>
      </div>
    </a>

    <!-- Post 2 -->
    <a href="https://www.instagram.com/p/DMNcADpo0-h/?img_index=1&igsh=ZDB3cDc0bXRuNTIx" target="_blank" rel="noopener noreferrer">
      <div class="post">
        <div class="post-image" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">🎬</div>
        <div class="post-content">
          <p>Guest Moments</p>
          <p>View on Instagram</p>
        </div>
      </div>
    </a>

    <!-- Profile -->
    <a href="https://www.instagram.com/levels360_/" target="_blank" rel="noopener noreferrer" class="profile">
      <div class="post">
        <div class="post-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">@</div>
        <div class="post-content">
          <p>Follow @levels360_</p>
          <p>See all posts and updates</p>
        </div>
      </div>
    </a>
  </div>

  <div style="text-align: center; margin-top: 60px;">
    <a href="/" style="color: #667eea; font-weight: bold;">← Back to Home</a>
  </div>
</body>
</html>
